format = """
$battery\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "blue bold"
truncation_length = 3
truncation_symbol = "ÔÇŽ/"
read_only = " ´áŻ"

[battery]
full_symbol = "ÔÇó"
charging_symbol = "Ôçí"
discharging_symbol = "Ôçú"

[git_branch]
format = "[$branch]($style)"
style = "bold black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](bright-black) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "conflicted"
untracked = "untracked"
modified = "modified"
staged = "staged"
renamed = "renamed"
deleted = "deleted"
stashed = "Ôëí"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[conda]
style = "green bold"
format = "[$symbol$environment]($style) "
